<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evalúa Andalucía Pro | 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <script type='text/javascript' src='//pl25150119.trustedcpmrevenue.com/26/50/33/265033c5b8e4e97554900a017e43434e.js'></script>
    <style>
        :root { --gold: #d4af37; --dark: #05070a; --surface: rgba(25, 30, 40, 0.7); --border: rgba(212, 175, 55, 0.3); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark); color: #fff; margin: 0; padding: 15px; min-height: 100vh; }
        .header { text-align: center; margin-bottom: 25px; }
        h1 { font-weight: 800; font-size: 1.8rem; margin: 0; background: linear-gradient(180deg, #fff 0%, var(--gold) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .controls { position: sticky; top: 0; z-index: 100; background: var(--dark); padding: 10px 0; display: flex; flex-direction: column; gap: 10px; }
        .search-box { background: var(--surface); border: 2px solid var(--gold); border-radius: 14px; padding: 16px; color: #fff; width: 100%; box-sizing: border-box; outline: none; font-size: 1rem; }
        .selectors { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .selector-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px; }
        select { width: 100%; background: transparent; border: none; color: var(--gold); font-size: 0.75rem; font-weight: 800; outline: none; appearance: none; cursor: pointer; text-transform: uppercase; }
        .criterio-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 25px; margin-bottom: 20px; border-left: 5px solid var(--gold); position: relative; }
        .badge { background: var(--gold); color: #000; padding: 4px 12px; border-radius: 8px; font-size: 0.7rem; font-weight: 900; margin-bottom: 15px; display: inline-block; }
        .grade-tag { font-size: 0.65rem; font-weight: 900; color: #000; background: #fff; padding: 3px 8px; border-radius: 5px; display: inline-block; margin-bottom: 10px; }
        .criterio-text { font-size: 1rem; color: #f1f5f9; text-align: justify; line-height: 1.6; margin-bottom: 15px; }
        .saberes { background: rgba(0,0,0,0.5); border-radius: 15px; padding: 20px; font-size: 0.8rem; color: #94a3b8; border: 1px solid rgba(212, 175, 55, 0.1); }
        .saberes strong { color: var(--gold); display: block; margin-bottom: 5px; text-transform: uppercase; }
        .btn-copy { position: absolute; top: 20px; right: 20px; background: rgba(212, 175, 55, 0.2); border: 1px solid var(--gold); color: var(--gold); border-radius: 8px; padding: 5px 10px; font-size: 0.6rem; cursor: pointer; font-weight: 800; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Evalúa Andalucía</h1>
        <div style="color: var(--gold); font-size: 0.65rem; font-weight: 700; letter-spacing: 3px; margin-top: 5px;">BASE DE DATOS INTEGRAL 2023-2027</div>
    </div>
    <div class="controls">
        <input type="text" id="searchInput" class="search-box" placeholder="🔍 Buscar término legal (ej. fracciones)..." onkeyup="render()">
        <div class="selectors">
            <div class="selector-box">
                <select id="etapa" onchange="updateSubjects(); render();">
                    <option value="primaria">Primaria</option>
                    <option value="eso">ESO</option>
                </select>
            </div>
            <div class="selector-box"><select id="ciclo" onchange="render()"></select></div>
            <div class="selector-box"><select id="materia" onchange="render()"></select></div>
        </div>
    </div>
    <div id="contentArea"></div>
    <script>
        let db = {};
        const labels = { primaria: { c1: "1º Ciclo", c2: "2º Ciclo", c3: "3º Ciclo" }, eso: { c1: "1º-3º ESO", c2: "4º ESO" } };
        fetch('./curriculum.json').then(res => res.json()).then(data => { db = data; updateSubjects(); render(); });
        function updateSubjects() {
            const etapa = document.getElementById('etapa').value;
            const cicloSel = document.getElementById('ciclo');
            const materiaSel = document.getElementById('materia');
            cicloSel.innerHTML = Object.keys(db[etapa] || {}).map(c => `<option value="${c}">${labels[etapa][c]}</option>`).join('');
            materiaSel.innerHTML = Object.keys(db[etapa][cicloSel.value] || {}).map(m => `<option value="${m}">${m.toUpperCase()}</option>`).join('');
        }
        function copyText(t) { navigator.clipboard.writeText(t); alert('Copiado al portapapeles'); }
        function render() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const etapa = document.getElementById('etapa').value;
            const ciclo = document.getElementById('ciclo').value;
            const materia = document.getElementById('materia').value;
            const area = document.getElementById('contentArea');
            area.innerHTML = '';
            if (!db[etapa] || !db[etapa][ciclo] || !db[etapa][ciclo][materia]) return;
            const items = db[etapa][ciclo][materia].filter(i => (i.t1 + i.t2 + i.sab).toLowerCase().includes(query));
            area.innerHTML = items.map(item => `
                <div class="criterio-card">
                    <button class="btn-copy" onclick="copyText('${item.t1.replace(/'/g, "\\'")} / ${item.t2.replace(/'/g, "\\'")} ')">COPIAR</button>
                    <span class="badge">CRITERIO ${item.id}</span>
                    <div><span class="grade-tag">CURSO A (IMPAR)</span><div class="criterio-text">${item.t1}</div></div>
                    <div style="margin-top:20px; border-top:1px solid rgba(255,255,255,0.05); padding-top:15px;">
                        <span class="grade-tag">CURSO B (PAR)</span><div class="criterio-text">${item.t2}</div>
                    </div>
                    <div class="saberes"><strong>SABERES BÁSICOS:</strong>${item.sab}</div>
                </div>`).join('');
        }
    </script>
</body>
</html>
