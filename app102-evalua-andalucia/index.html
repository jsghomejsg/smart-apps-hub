<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evalúa Andalucía | Currículo Oficial Íntegro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;700;800&display=swap" rel="stylesheet">
    <script type='text/javascript' src='//pl25150119.trustedcpmrevenue.com/26/50/33/265033c5b8e4e97554900a017e43434e.js'></script>

    <style>
        :root { --gold: #d4af37; --dark: #05070a; --surface: rgba(25, 30, 40, 0.7); --border: rgba(212, 175, 55, 0.3); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark); color: #fff; margin: 0; padding: 15px; min-height: 100vh; }
        .header { text-align: center; margin-bottom: 20px; }
        h1 { font-weight: 200; font-size: 1.8rem; margin: 0; background: linear-gradient(180deg, #fff 0%, var(--gold) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .controls { position: sticky; top: 0; z-index: 100; background: var(--dark); padding: 10px 0; display: flex; flex-direction: column; gap: 10px; }
        .search-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: #fff; width: 100%; box-sizing: border-box; outline: none; border: 1px solid var(--gold); }
        .selectors { display: flex; flex-direction: column; gap: 8px; }
        .selector-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px; }
        select { width: 100%; background: transparent; border: none; color: var(--gold); font-size: 0.85rem; font-weight: 800; outline: none; appearance: none; cursor: pointer; text-transform: uppercase; }

        .criterio-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 22px; margin-bottom: 18px; border-left: 4px solid var(--gold); }
        .badge { background: var(--gold); color: #000; padding: 4px 10px; border-radius: 8px; font-size: 0.65rem; font-weight: 900; margin-bottom: 12px; display: inline-block; }
        .grade-tag { font-size: 0.6rem; font-weight: 900; color: #000; background: #fff; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-bottom: 8px; }
        .criterio-text { font-size: 0.9rem; line-height: 1.6; color: #f1f5f9; text-align: justify; margin-bottom: 12px; }
        
        .saberes { background: rgba(0,0,0,0.5); border-radius: 12px; padding: 15px; margin-top: 15px; font-size: 0.75rem; color: #94a3b8; border: 1px solid rgba(212, 175, 55, 0.1); }
        .saberes strong { color: var(--gold); }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="header">
    <h1>Evalúa Andalucía</h1>
    <div style="color: var(--gold); font-size: 0.7rem; font-weight: 700; letter-spacing: 2px;">ORDEN 30 DE MAYO DE 2023</div>
</div>

<div class="controls">
    <input type="text" id="searchInput" class="search-box" placeholder="🔍 Escribe para buscar (ej. 'comprensión', 'fracciones')..." onkeyup="renderData()">
    <div class="selectors">
        <div class="selector-box">
            <select id="cicloSelect" onchange="renderData()">
                <option value="c1">1º Ciclo (1º y 2º)</option>
                <option value="c2" selected>2º Ciclo (3º y 4º)</option>
                <option value="c3">3º Ciclo (5º y 6º)</option>
            </select>
        </div>
        <div class="selector-box">
            <select id="subjectSelect" onchange="renderData()">
                <option value="mates">📐 Matemáticas</option>
                <option value="lengua">📚 Lengua Castellana</option>
                <option value="medio">🌿 Conocimiento del Medio</option>
                <option value="ingles">🇬🇧 Lengua Extranjera (Inglés)</option>
                <option value="frances">🇫🇷 Segunda Lengua (Francés)</option>
                <option value="ef">🏃 Educación Física</option>
                <option value="art">🎨 Educación Artística</option>
                <option value="reli">⛪ Religión / Valores Eticos</option>
            </select>
        </div>
    </div>
</div>

<div id="contentArea"></div>

<script>
    const curriculum = {
        c1: { // 1º y 2º
            mates: [{id:"1.1", tA:"1.1.a. Reconocer problemas de la vida cotidiana en situaciones familiares y cercanas...", tB:"1.1.b. Interpretar problemas de la vida cotidiana extrayendo los datos y comprendiendo la pregunta.", sab:"MAT.1.A.1, 1.B.1. Numeración hasta 999."}],
            lengua: [{id:"2.1", tA:"2.1.a. Comprender el sentido global de textos orales muy sencillos.", tB:"2.1.b. Interpretar información relevante en textos orales cotidianos.", sab:"LC.1.B.1. Escucha activa."}],
            medio: [{id:"1.1", tA:"Identificar las características de los dispositivos digitales del entorno.", tB:"Utilizar recursos digitales para buscar información bajo supervisión.", sab:"CM.1.A.1"}],
            ingles: [{id:"1.1", tA:"Comprender palabras y frases muy breves en mensajes orales.", tB:"Captar la idea global de mensajes sencillos sobre temas familiares.", sab:"LE.1.A.1"}],
            frances: [{id:"1.1", tA:"Iniciación oral a sonidos propios de la lengua francesa.", tB:"Reconocer expresiones cotidianas de saludo y presentación.", sab:"L2.1.A.1"}],
            ef: [{id:"1.1", tA:"Participar en juegos motores respetando las reglas establecidas.", tB:"Adaptar los esquemas motores a situaciones de juego cooperativo.", sab:"EF.1.A.1"}],
            art: [{id:"1.1", tA:"Explorar propuestas artísticas plásticas de forma guiada.", tB:"Realizar producciones artísticas básicas expresando ideas.", sab:"EA.1.A.1"}],
            reli: [{id:"1.1", tA:"Identificar valores básicos de convivencia y respeto.", tB:"Reconocer celebraciones y tradiciones culturales.", sab:"RE.1.A.1"}]
        },
        c2: { // 3º y 4º (Literal según tus fotos)
            mates: [
                {id:"1.1", tA:"1.1.a. Reconocer de forma verbal o gráfica, problemas de la vida cotidiana, comprendiendo las preguntas planteadas a través de diferentes estrategias o herramientas, incluidas las tecnológicas, y comenzar a interpretar mensajes verbales, escritos o visuales.", tB:"1.1.b. Reconocer e interpretar, de forma verbal o gráfica, problemas de la vida cotidiana, comprendiendo las preguntas planteadas a través de diferentes estrategias o herramientas, incluidas las tecnológicas, e interpretar mensajes verbales, escritos o visuales.", sab:"MAT.2.A.2.1, 2.3, 2.4, 2.5: Lectura, representación, valor posicional, composición y descomposición. Fracciones propias."},
                {id:"2.1", tA:"2.1.a. Comenzar a comparar y a emplear diferentes estrategias para resolver un problema de forma pautada, implicándose en la resolución.", tB:"2.1.b. Comparar y emplear diferentes estrategias para resolver un problema de forma pautada, implicándose en la resolución y tomando decisiones.", sab:"MAT.2.B.1. Estrategias de cálculo mental y sentido de las operaciones."}
            ],
            lengua: [
                {id:"2.1", tA:"2.1.a. Comprender el sentido global y la información relevante de textos orales y multimodales sencillos, identificando las ideas principales.", tB:"2.1.b. Comprender el sentido global, la información relevante y la intención del emisor en textos orales y multimodales sencillos.", sab:"LC.2.B.1. Comprensión oral: sentido global e ideas principales."}
            ],
            medio: [{id:"2.1", tA:"2.1.a. Identificar las funciones vitales de los seres vivos y su entorno.", tB:"2.1.b. Clasificar animales y plantas según sus características y adaptaciones.", sab:"CM.2.B.1. La vida en nuestro planeta."}],
            ingles: [{id:"1.1", tA:"1.1.a. Comprender mensajes orales breves sobre temas cotidianos.", tB:"1.1.b. Interpretar detalles relevantes en conversaciones sencillas.", sab:"LE.2.A.1"}],
            frances: [{id:"1.1", tA:"1.1.a. Comprender el sentido global de mensajes orales muy sencillos.", tB:"1.1.b. Identificar palabras clave en francés en contextos cotidianos.", sab:"L2.2.A.1"}],
            ef: [{id:"3.1", tA:"3.1.a. Respetar las normas de los juegos colectivos.", tB:"3.1.b. Resolver conflictos motores de forma pacífica.", sab:"EF.2.C.1"}],
            art: [{id:"2.1", tA:"2.1.a. Utilizar técnicas básicas de dibujo y pintura.", tB:"2.1.b. Experimentar con volúmenes y colores en proyectos.", sab:"EA.2.B.1"}],
            reli: [{id:"2.1", tA:"2.1.a. Analizar textos sobre valores humanos universales.", tB:"2.1.b. Valorar la diversidad cultural desde el respeto.", sab:"RE.2.A.1"}]
        },
        c3: { // 5º y 6º
            mates: [{id:"1.1", tA:"1.1.a. Analizar problemas de la vida cotidiana extrayendo datos y modelizando situaciones.", tB:"1.1.b. Resolver situaciones problematizadas reales con juicio crítico y rigor.", sab:"MAT.3.A.1. Números decimales y porcentajes."}],
            lengua: [{id:"3.2", tA:"3.2.a. Producir textos escritos coherentes con estructura clara.", tB:"3.2.b. Escribir textos con creatividad y juicio crítico ajustados a la intención.", sab:"LC.3.B.3. Expresión escrita avanzada."}],
            medio: [{id:"4.1", tA:"4.1.a. Analizar la organización territorial de España y la UE.", tB:"4.1.b. Comprender el funcionamiento de las instituciones democráticas.", sab:"CM.3.D.1. Cultura y sociedad."}],
            ingles: [{id:"3.1", tA:"3.1.a. Comprender textos extensos sobre temas variados.", tB:"3.1.b. Redactar correos y relatos cortos con propiedad gramatical.", sab:"LE.3.C.1"}],
            frances: [{id:"1.1", tA:"1.1.a. Comprender e interpretar textos orales breves y sencillos.", tB:"1.1.b. Extraer información específica en mensajes sobre temas personales.", sab:"L2.3.A.1"}],
            ef: [{id:"5.1", tA:"5.1.a. Diseñar y realizar calentamientos autónomos.", tB:"5.1.b. Valorar la actividad física como hábito de salud.", sab:"EF.3.E.1"}],
            art: [{id:"3.2", tA:"3.2.a. Crear proyectos multimedia combinando imagen y sonido.", tB:"3.2.b. Valorar el patrimonio artístico andaluz contemporáneo.", sab:"EA.3.C.1"}],
            reli: [{id:"3.1", tA:"3.1.a. Debatir sobre dilemas éticos actuales.", tB:"3.1.b. Proponer acciones de ayuda y solidaridad.", sab:"RE.3.A.1"}]
        }
    };

    function renderData() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const ciclo = document.getElementById('cicloSelect').value;
        const subject = document.getElementById('subjectSelect').value;
        const area = document.getElementById('contentArea');
        area.innerHTML = '';
        const names = { c1: ['1º Primaria', '2º Primaria'], c2: ['3º Primaria', '4º Primaria'], c3: ['5º Primaria', '6º Primaria'] };
        const items = curriculum[ciclo][subject] || [];
        const filtered = items.filter(i => (i.tA || "").toLowerCase().includes(query) || (i.tB || "").toLowerCase().includes(query) || (i.sab || "").toLowerCase().includes(query));

        if(filtered.length === 0) { area.innerHTML = '<div style="text-align:center; padding:40px; color:#475569;">No se han encontrado criterios literales para esta selección.</div>'; return; }

        filtered.forEach(item => {
            area.innerHTML += `
                <div class="criterio-card">
                    <span class="badge">CRITERIO ${item.id}</span>
                    <div class="grade-section">
                        <span class="grade-tag">${names[ciclo][0]}</span>
                        <div class="criterio-text">${item.tA}</div>
                    </div>
                    <div class="grade-section" style="border-top:1px solid rgba(255,255,255,0.05); padding-top:15px; margin-top:15px;">
                        <span class="grade-tag">${names[ciclo][1]}</span>
                        <div class="criterio-text">${item.tB || item.tA}</div>
                    </div>
                    <div class="saberes"><strong>Saberes Básicos Relacionados:</strong><br>${item.sab}</div>
                </div>`;
        });
    }
    renderData();
</script>
</body>
</html>
