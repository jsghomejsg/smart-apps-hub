<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evalúa Andalucía Pro | Primaria</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #05070a; --surface: rgba(25, 30, 40, 0.7); --border: rgba(212, 175, 55, 0.3); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark); color: #fff; margin: 0; padding: 15px; min-height: 100vh; }
        .header { text-align: center; margin-bottom: 20px; }
        h1 { font-weight: 200; font-size: 2rem; margin: 0; background: linear-gradient(180deg, #fff 0%, var(--gold) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .search-box { background: var(--surface); border: 1px solid var(--border); border-radius: 15px; padding: 12px 15px; color: #fff; width: 100%; box-sizing: border-box; outline: none; font-family: inherit; }
        .selectors { display: flex; gap: 8px; }
        .selector-box { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 15px; padding: 10px; }
        select { width: 100%; background: transparent; border: none; color: var(--gold); font-size: 0.8rem; font-weight: 800; outline: none; appearance: none; cursor: pointer; text-transform: uppercase; }
        .criterio-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        .badge { background: var(--gold); color: #000; padding: 4px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 900; margin-bottom: 15px; display: inline-block; }
        .grade-section { margin-top: 15px; }
        .grade-tag { font-size: 0.6rem; font-weight: 900; color: #000; background: #fff; padding: 2px 6px; border-radius: 4px; margin-bottom: 8px; display: inline-block; }
        .criterio-text { font-size: 0.9rem; line-height: 1.6; color: #f1f5f9; text-align: justify; }
        .saberes-container { background: rgba(0,0,0,0.4); border-radius: 12px; padding: 12px; margin-top: 15px; border-left: 3px solid var(--gold); }
        .saberes-text { font-size: 0.75rem; color: #94a3b8; line-height: 1.4; }
        .share-btn { width: 100%; background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 15px; font-weight: 800; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h1>Evalúa Andalucía</h1>
    <div style="color: var(--gold); font-size: 0.7rem; font-weight: 700; letter-spacing: 2px;">DOCUMENTACIÓN OFICIAL DOCENTE</div>
</div>

<div class="controls">
    <input type="text" id="searchInput" class="search-box" placeholder="🔍 Buscar: ej. 'fracciones', 'cálculo', 'textos'..." onkeyup="renderData()">
    <div class="selectors">
        <div class="selector-box">
            <select id="cicloSelect" onchange="renderData()">
                <option value="c1">1º Ciclo (1º/2º)</option>
                <option value="c2" selected>2º Ciclo (3º/4º)</option>
                <option value="c3">3º Ciclo (5º/6º)</option>
            </select>
        </div>
        <div class="selector-box">
            <select id="subjectSelect" onchange="renderData()">
                <option value="mates">📐 Matemáticas</option>
                <option value="lengua">📚 Lengua Castellana</option>
            </select>
        </div>
    </div>
</div>

<div id="contentArea"></div>

<button class="share-btn" onclick="shareApp()">COMPARTIR CON EL CLAUSTRO</button>

<script>
    const curriculum = {
        c1: { // PRIMER CICLO
            mates: [
                { id: "1.1", tA: "1.1.a. Reconocer problemas de la vida cotidiana en situaciones familiares, comprendiendo las preguntas planteadas.", tB: "1.1.b. Interpretar problemas de la vida cotidiana, extrayendo los datos y comprendiendo las preguntas planteadas.", sab: "MAT.1.A.1, MAT.1.A.2" }
            ],
            lengua: [
                { id: "2.1", tA: "2.1.a. Comprender el sentido global de textos orales sencillos (instrucciones, relatos).", tB: "2.1.b. Interpretar información relevante en textos orales y multimodales sobre temas cotidianos.", sab: "LC.1.B.1" }
            ]
        },
        c2: { // SEGUNDO CICLO (El que tenías antes)
            mates: [
                { id: "1.1", tA: "1.1.a. Reconocer de forma verbal o gráfica, problemas de la vida cotidiana, comprendiendo las preguntas planteadas...", tB: "1.1.b. Reconocer e interpretar, de forma verbal o gráfica, problemas de la vida cotidiana...", sab: "MAT.2.A.2.1, MAT.2.A.3.1" }
            ],
            lengua: [
                { id: "2.1", tA: "2.1.a. Comprender el sentido global y la información relevante de textos orales y multimodales sencillos...", tB: "2.1.b. Comprender el sentido global e intención del emisor en textos orales y multimodales.", sab: "LC.2.B.1" }
            ]
        },
        c3: { // TERCER CICLO (El que te salía vacío)
            mates: [
                { id: "1.1", tA: "1.1.a. Analizar problemas de la vida cotidiana, extrayendo los datos, comprendiendo las preguntas y modelizando situaciones.", tB: "1.1.b. Resolver situaciones problematizadas reales, interpretando los mensajes y utilizando herramientas matemáticas avanzadas.", sab: "MAT.3.A.1, MAT.3.B.1" }
            ],
            lengua: [
                { id: "3.2", tA: "3.2.a. Producir textos escritos y multimodales coherentes, con una estructura clara y utilizando un vocabulario adecuado.", tB: "3.2.b. Producir textos con creatividad y juicio crítico, ajustándose a la intención comunicativa y aplicando normas gramaticales.", sab: "LC.3.C.1" }
            ]
        }
    };

    function renderData() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const ciclo = document.getElementById('cicloSelect').value;
        const subject = document.getElementById('subjectSelect').value;
        const area = document.getElementById('contentArea');
        area.innerHTML = '';

        const names = { c1: ['1º Primaria', '2º Primaria'], c2: ['3º Primaria', '4º Primaria'], c3: ['5º Primaria', '6º Primaria'] };
        const items = curriculum[ciclo][subject] || [];

        const filtered = items.filter(i => i.tA.toLowerCase().includes(query) || i.tB.toLowerCase().includes(query));

        if(filtered.length === 0) {
            area.innerHTML = '<div style="text-align:center; padding:40px; color:#475569;">No hay resultados en este ciclo.</div>';
            return;
        }

        filtered.forEach(item => {
            area.innerHTML += `
                <div class="criterio-card">
                    <span class="badge">CRITERIO ${item.id}</span>
                    <div class="grade-section">
                        <span class="grade-tag">${names[ciclo][0]}</span>
                        <div class="criterio-text">${item.tA}</div>
                    </div>
                    <div class="grade-section">
                        <span class="grade-tag">${names[ciclo][1]}</span>
                        <div class="criterio-text">${item.tB}</div>
                    </div>
                    <div class="saberes-container"><div class="saberes-text"><strong>Saberes:</strong> ${item.sab}</div></div>
                </div>`;
        });
    }

    function shareApp() { if (navigator.share) { navigator.share({ title: 'Evalúa Andalucía Pro', url: window.location.href }); } }
    renderData();
</script>
</body>
</html>
