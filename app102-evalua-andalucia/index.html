<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evalúa Andalucía Pro | 2026</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#d4af37">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    
    <script type='text/javascript' src='//pl25150119.trustedcpmrevenue.com/26/50/33/265033c5b8e4e97554900a017e43434e.js'></script>

    <style>
        :root { --gold: #d4af37; --dark: #05070a; --surface: rgba(25, 30, 40, 0.7); --border: rgba(212, 175, 55, 0.3); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark); color: #fff; margin: 0; padding: 15px; min-height: 100vh; }
        .header { text-align: center; margin-bottom: 25px; }
        h1 { font-weight: 800; font-size: 1.8rem; margin: 0; background: linear-gradient(180deg, #fff 0%, var(--gold) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .controls { position: sticky; top: 0; z-index: 100; background: var(--dark); padding: 10px 0; display: flex; flex-direction: column; gap: 10px; }
        .search-box { background: var(--surface); border: 2px solid var(--gold); border-radius: 14px; padding: 16px; color: #fff; width: 100%; box-sizing: border-box; outline: none; font-size: 1rem; }
        .selectors { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .selector-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px; }
        select { width: 100%; background: transparent; border: none; color: var(--gold); font-size: 0.8rem; font-weight: 800; outline: none; appearance: none; cursor: pointer; text-transform: uppercase; }
        .criterio-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 25px; margin-bottom: 20px; border-left: 5px solid var(--gold); }
        .badge { background: var(--gold); color: #000; padding: 5px 12px; border-radius: 8px; font-size: 0.7rem; font-weight: 900; margin-bottom: 15px; display: inline-block; }
        .grade-tag { font-size: 0.65rem; font-weight: 900; color: #000; background: #fff; padding: 3px 8px; border-radius: 5px; display: inline-block; margin-bottom: 10px; }
        .criterio-text { font-size: 1rem; color: #f1f5f9; text-align: justify; line-height: 1.6; margin-bottom: 15px; }
        .saberes { background: rgba(0,0,0,0.5); border-radius: 15px; padding: 20px; font-size: 0.8rem; color: #94a3b8; border: 1px solid rgba(212, 175, 55, 0.1); }
        .saberes strong { color: var(--gold); display: block; margin-bottom: 5px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="header">
    <h1>Evalúa Andalucía</h1>
    <div style="color: var(--gold); font-size: 0.65rem; font-weight: 700; letter-spacing: 3px; margin-top: 5px;">BASE DE DATOS TOTAL BOJA 2023</div>
</div>

<div class="controls">
    <input type="text" id="searchInput" class="search-box" placeholder="🔍 Buscar término legal (ej. ecosistema)..." onkeyup="render()">
    <div class="selectors">
        <div class="selector-box">
            <select id="etapa" onchange="initApp()"><option value="primaria">Primaria</option><option value="eso">ESO</option></select>
        </div>
        <div class="selector-box">
            <select id="ciclo" onchange="updateSubjects()"></select>
        </div>
    </div>
    <div class="selector-box">
        <select id="materia" onchange="render()"></select>
    </div>
</div>

<div style="text-align:center; margin:10px 0;">
    <script type="text/javascript">
        atOptions = { 'key' : '7e43434e34e9755490a010c5b8e4e975', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
    </script>
    <script type="text/javascript" src="//www.highperformanceformat.com/7e43434e34e9755490a010c5b8e4e975/invoke.js"></script>
</div>

<div id="contentArea"></div>

<script>
    const data = {
        primaria: {
            "c1": {
                "matemáticas": [
                    { id: "1.1", t1: "1.1.a. Reconocer problemas de la vida cotidiana en situaciones familiares y cercanas, comprendiendo las preguntas planteadas a través de diferentes estrategias o herramientas, incluidas las tecnológicas, y comenzar a interpretar mensajes verbales, escritos o visuales.", t2: "1.1.b. Interpretar problemas de la vida cotidiana, extrayendo los datos y comprendiendo las preguntas planteadas a través de diferentes estrategias o herramientas, incluidas las tecnológicas, e interpretar mensajes verbales, escritos o visuales.", sab: "MAT.1.A.1: Conteo y numeración. MAT.1.A.2: Valor posicional." },
                    { id: "2.1", t1: "2.1.a. Resolver problemas de una sola operación con números naturales en situaciones de la vida cotidiana.", t2: "2.1.b. Resolver problemas de una o dos operaciones con números naturales, utilizando estrategias de cálculo mental.", sab: "MAT.1.B.1: Sentido de las operaciones." }
                ],
                "lengua castellana": [
                    { id: "2.1", t1: "2.1.a. Comprender el sentido global y la información relevante de textos orales y multimodales muy sencillos.", t2: "2.1.b. Comprender el sentido global e interpretar información relevante de textos orales y multimodales sencillos.", sab: "LCL.1.B.1.1: Escucha activa." }
                ],
                "c. medio": [
                    { id: "1.1", t1: "1.1.a. Identificar dispositivos digitales básicos del entorno.", t2: "1.1.b. Utilizar recursos digitales de forma guiada para buscar información.", sab: "CMN.1.A.1: Dispositivos digitales." }
                ],
                "inglés": [
                    { id: "1.1", t1: "1.1.a. Comprender palabras y frases muy breves en mensajes orales.", t2: "1.1.b. Captar la idea global de mensajes sencillos.", sab: "LEA.1.A.1: Comprensión oral." }
                ],
                "francés": [
                    { id: "1.1", t1: "1.1.a. Iniciación oral a sonidos propios de la lengua francesa.", t2: "1.1.b. Reconocer expresiones cotidianas de saludo y presentación.", sab: "L2.1.A.1: Fonética y saludos." }
                ],
                "ed. física": [
                    { id: "1.1", t1: "1.1.a. Participar en juegos motores respetando las reglas.", t2: "1.1.b. Adaptar esquemas motores básicos a diferentes situaciones.", sab: "EF.1.A.1: Habilidades motrices." }
                ],
                "ed. artística": [
                    { id: "1.1", t1: "1.1.a. Descubrir propuestas artísticas de diferentes géneros.", t2: "1.1.b. Identificar propuestas artísticas valorando su diversidad.", sab: "EA.1.A.1: Percepción visual." }
                ],
                "religión/valores": [
                    { id: "1.1", t1: "1.1.a. Identificar valores fundamentales de convivencia.", t2: "1.1.b. Reconocer tradiciones culturales de la comunidad.", sab: "RE.1.A.1: Cultura y valores." }
                ]
            },
            "c2": {
                "matemáticas": [{ id: "1.1", t1: "1.1.a. Reconocer problemas de la vida cotidiana comprendiendo las preguntas planteadas.", t2: "1.1.b. Interpretar problemas extrayendo datos y comprendiendo las preguntas.", sab: "MAT.2.A.2: Fracciones y numeración hasta 9999." }],
                "lengua castellana": [{ id: "3.3", t1: "3.3.a. Conocer textos orales sencillos con planificación acompañada.", t2: "3.3.b. Producir textos orales coherentes de la literatura infantil andaluza.", sab: "LCL.2.B.3.3: Literatura andaluza." }],
                "c. medio": [{ id: "2.1", t1: "2.1.a. Identificar las funciones vitales.", t2: "2.1.b. Clasificar seres vivos según sus características.", sab: "CMN.2.B.1.1: Seres vivos." }],
                "inglés": [{ id: "2.1", t1: "2.1.a. Comprender mensajes orales sobre temas familiares.", t2: "2.1.b. Identificar información específica en textos orales.", sab: "LEA.2.A.1: Comprensión oral." }],
                "educación física": [{ id: "3.1", t1: "3.1.a. Respetar las normas en juegos colectivos.", t2: "3.1.b. Resolver conflictos motores de forma pacífica.", sab: "EF.2.C.1: Convivencia." }],
                "ed. artística": [{ id: "2.1", t1: "2.1.a. Aplicar técnicas básicas de dibujo.", t2: "2.1.b. Experimentar con volúmenes y colores.", sab: "EA.2.B.1: Creación plástica." }]
            },
            "c3": {
                "matemáticas": [{ id: "1.1", t1: "1.1.a. Analizar problemas modelizando situaciones de mayor complejidad.", t2: "1.1.b. Resolver situaciones problematizadas reales valorando el resultado.", sab: "MAT.3.A.1: Decimales y porcentajes." }],
                "lengua castellana": [{ id: "3.2", t1: "3.2.a. Producir textos escritos coherentes.", t2: "3.2.b. Escribir textos con creatividad y juicio crítico.", sab: "LCL.3.B.3: Expresión escrita." }],
                "inglés": [{ id: "3.1", t1: "3.1.a. Comprender textos orales extensos.", t2: "3.1.b. Redactar correos y relatos cortos.", sab: "LEA.3.C.1: Inglés avanzado." }],
                "ed. física": [{ id: "5.1", t1: "5.1.a. Diseñar calentamientos físicos de forma autónoma.", t2: "5.1.b. Valorar la actividad física como hábito de salud.", sab: "EF.3.E.1: Salud." }]
            }
        },
        eso: {
            "c1": {
                "biología": [{ id: "1.1", t1: "1.1. Analizar conceptos biológicos interpretando información.", t2: "1.1. Resolver retos sobre ciencias aplicando el método científico.", sab: "BIO.1.A: Trabajo científico." }],
                "matemáticas": [{ id: "1.1", t1: "1.1. Interpretar problemas de la vida cotidiana complejos.", t2: "1.1. Resolver problemas mediante pensamiento computacional.", sab: "MAT.1.A: Sentido numérico." }],
                "lengua": [{ id: "2.1", t1: "2.1. Comprender sentido global e intención en textos orales.", t2: "2.1. Analizar textos orales identificando sesgos.", sab: "LCL.1.B: Comprensión oral." }]
            },
            "c2": {
                "tecnología": [{ id: "2.1", t1: "2.1. Diseñar prototipos para responder a necesidades.", t2: "2.1. Utilizar herramientas de fabricación digital.", sab: "TEC.4.B: Robótica." }],
                "física/química": [{ id: "1.1", t1: "1.1. Aplicar leyes de la física en el entorno cercano.", t2: "1.1. Resolver retos científicos mediante experimentación.", sab: "FYQ.4.B: Movimiento." }]
            }
        }
    };

    function initApp() {
        const etapa = document.getElementById('etapa').value;
        const cicloSel = document.getElementById('ciclo');
        const labels = etapa === 'primaria' ? {c1: "1º Ciclo (1º/2º)", c2: "2º Ciclo (3º/4º)", c3: "3º Ciclo (5º/6º)"} : {c1: "1º-3º ESO", c2: "4º ESO"};
        cicloSel.innerHTML = Object.keys(data[etapa]).map(c => `<option value="${c}">${labels[c]}</option>`).join('');
        updateSubjects();
    }

    function updateSubjects() {
        const etapa = document.getElementById('etapa').value;
        const ciclo = document.getElementById('ciclo').value;
        const materiaSel = document.getElementById('materia');
        materiaSel.innerHTML = Object.keys(data[etapa][ciclo]).map(m => `<option value="${m}">${m.toUpperCase()}</option>`).join('');
        render();
    }

    function render() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const etapa = document.getElementById('etapa').value;
        const ciclo = document.getElementById('ciclo').value;
        const materia = document.getElementById('materia').value;
        const area = document.getElementById('contentArea');
        area.innerHTML = '';
        const items = (data[etapa][ciclo][materia] || []).filter(i => (i.t1 + i.t2 + i.sab).toLowerCase().includes(query));
        area.innerHTML = items.map(item => `
            <div class="criterio-card">
                <span class="badge">CRITERIO ${item.id}</span>
                <div><span class="grade-tag">NIVEL A</span><div class="criterio-text">${item.t1}</div></div>
                <div style="margin-top:20px; border-top:1px solid rgba(255,255,255,0.05); padding-top:15px;">
                    <span class="grade-tag">NIVEL B</span><div class="criterio-text">${item.t2}</div>
                </div>
                <div class="saberes"><strong>SABERES BÁSICOS OFICIALES:</strong>${item.sab}</div>
            </div>`).join('');
    }

    initApp();
</script>
</body>
</html>
