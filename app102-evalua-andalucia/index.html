<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evalúa Andalucía | Guía Docente Premium</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#d4af37">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;700;800&display=swap" rel="stylesheet">
    
    <script type='text/javascript' src='//pl25150119.trustedcpmrevenue.com/26/50/33/265033c5b8e4e97554900a017e43434e.js'></script>

    <style>
        :root {
            --gold: #d4af37;
            --dark: #05070a;
            --surface: rgba(25, 30, 40, 0.6);
            --border: rgba(212, 175, 55, 0.2);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--dark);
            background-image: radial-gradient(circle at 0% 0%, #1a1c20 0%, transparent 50%),
                              radial-gradient(circle at 100% 100%, #0c0e12 0%, transparent 50%);
            color: #fff;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .header { text-align: center; margin-bottom: 30px; }
        h1 { font-weight: 200; font-size: 2.2rem; margin: 0; background: linear-gradient(180deg, #fff 0%, var(--gold) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Selector de Asignaturas */
        .selector-box {
            background: var(--surface);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 25px;
        }

        select {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--gold);
            font-size: 1.1rem;
            font-weight: 700;
            outline: none;
            cursor: pointer;
        }

        /* Tarjetas de Criterios */
        .criterio-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 20px;
            animation: fadeIn 0.5s ease;
        }

        .badge {
            display: inline-block;
            background: var(--gold);
            color: #000;
            padding: 4px 12px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 800;
            margin-bottom: 15px;
        }

        .criterio-text { font-size: 1rem; line-height: 1.6; color: #e0e0e0; margin-bottom: 15px; }
        
        .saberes-box {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 15px;
            font-size: 0.85rem;
            border-left: 3px solid var(--gold);
        }

        .saberes-title { color: var(--gold); font-weight: 700; margin-bottom: 5px; font-size: 0.75rem; text-transform: uppercase; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="header">
    <h1>Evalúa Andalucía</h1>
    <p style="color: #64748b; font-size: 0.8rem;">Segundo Ciclo Primaria (3º y 4º)</p>
</div>

<div class="selector-box">
    <select id="subjectSelect" onchange="renderData()">
        <option value="mates">Matemáticas</option>
        <option value="lengua">Lengua Castellana</option>
        <option value="ingles">Lengua Extranjera (Inglés)</option>
        <option value="conoci">Conocimiento del Medio</option>
    </select>
</div>

<div id="contentArea">
    </div>

<script>
    // BASE DE DATOS DE LA APP
    const data = {
        mates: [
            {
                id: "1.1.a",
                texto: "Interpretar situaciones sencillas de la vida cotidiana, proporcionando una representación matemática de las mismas...",
                saberes: "MAT.2.A.1.1, MAT.2.A.2.1 (Números naturales y lectura)"
            },
            {
                id: "1.2.b",
                texto: "Resolver problemas matemáticos sencillos de forma guiada en situaciones cotidianas...",
                saberes: "MAT.2.B.1.2 (Estrategias de resolución)"
            }
        ],
        lengua: [
            {
                id: "2.1.a",
                texto: "Comprender el sentido global de textos orales, escritos y multimodales sencillos...",
                saberes: "LC.2.A.1 (Comprensión lectora)"
            }
        ],
        ingles: [
            {
                id: "1.1",
                texto: "Comprender palabras y frases cortas en mensajes orales sencillos sobre temas familiares...",
                saberes: "LE.2.A.1 (Léxico básico)"
            }
        ],
        conoci: [
            {
                id: "3.1.a",
                texto: "Identificar las características y componentes principales de los ecosistemas del entorno...",
                saberes: "CM.2.B.2 (La vida en la Tierra)"
            }
        ]
    };

    function renderData() {
        const subject = document.getElementById('subjectSelect').value;
        const area = document.getElementById('contentArea');
        area.innerHTML = '';

        data[subject].forEach(item => {
            area.innerHTML += `
                <div class="criterio-card">
                    <span class="badge">CRITERIO ${item.id}</span>
                    <div class="criterio-text">${item.texto}</div>
                    <div class="saberes-box">
                        <div class="saberes-title">Saberes Básicos Relacionados:</div>
                        <div style="color: #94a3b8">${item.saberes}</div>
                    </div>
                </div>
            `;
        });
    }

    // Carga inicial
    renderData();

    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
</script>

</body>
</html>
