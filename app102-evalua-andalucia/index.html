<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evalúa Andalucía Pro | Primaria Completa</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#d4af37">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;700;800&display=swap" rel="stylesheet">
    <script type='text/javascript' src='//pl25150119.trustedcpmrevenue.com/26/50/33/265033c5b8e4e97554900a017e43434e.js'></script>

    <style>
        :root { --gold: #d4af37; --dark: #05070a; --surface: rgba(25, 30, 40, 0.6); --border: rgba(212, 175, 55, 0.2); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark); background-image: radial-gradient(circle at 0% 0%, #1a1c20 0%, transparent 50%), radial-gradient(circle at 100% 100%, #0c0e12 0%, transparent 50%); color: #fff; margin: 0; padding: 15px; min-height: 100vh; }
        .header { text-align: center; margin-bottom: 20px; }
        h1 { font-weight: 200; font-size: 2.2rem; margin: 0; background: linear-gradient(180deg, #fff 0%, var(--gold) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .filters { display: flex; gap: 10px; margin-bottom: 25px; }
        .selector-box { flex: 1; background: var(--surface); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 18px; padding: 12px; }
        select { width: 100%; background: transparent; border: none; color: var(--gold); font-size: 0.9rem; font-weight: 700; outline: none; appearance: none; }

        .criterio-card { background: var(--surface); border: 1px solid var(--border); border-radius: 25px; padding: 20px; margin-bottom: 15px; animation: fadeIn 0.4s ease; }
        .badge { background: var(--gold); color: #000; padding: 4px 10px; border-radius: 10px; font-size: 0.7rem; font-weight: 800; margin-bottom: 10px; display: inline-block; }
        .grade-label { color: var(--gold); font-size: 0.65rem; font-weight: 800; text-transform: uppercase; margin-top: 10px; display: block; }
        .criterio-text { font-size: 0.9rem; line-height: 1.5; color: #f1f5f9; margin-bottom: 10px; }
        .saberes { background: rgba(0,0,0,0.4); border-radius: 15px; padding: 12px; font-size: 0.8rem; border-left: 3px solid var(--gold); margin-top: 10px; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="header">
    <h1>Evalúa Andalucía</h1>
    <div style="color: #64748b; font-size: 0.7rem; letter-spacing: 2px;">CURRÍCULO OFICIAL LOMLOE</div>
</div>

<div class="filters">
    <div class="selector-box">
        <select id="cicloSelect" onchange="renderData()">
            <option value="c1">1º Ciclo (1º/2º)</option>
            <option value="c2" selected>2º Ciclo (3º/4º)</option>
            <option value="c3">3º Ciclo (5º/6º)</option>
        </select>
    </div>
    <div class="selector-box">
        <select id="subjectSelect" onchange="renderData()">
            <option value="mates">📐 Mates</option>
            <option value="lengua">📚 Lengua</option>
            <option value="conoci">🌿 Medio</option>
            <option value="ingles">🇬🇧 Inglés</option>
        </select>
    </div>
</div>

<div id="contentArea"></div>

<script>
    const curriculum = {
        c1: { // PRIMER CICLO
            mates: [{ id: "1.1", t1: "Reconocer problemas de la vida cotidiana...", t2: "Interpretar y resolver problemas sencillos...", sab: "MAT.1.A.1, MAT.1.B.2" }],
            lengua: [{ id: "2.1", t1: "Comprender el sentido global de textos orales...", t2: "Interpretar información relevante en textos...", sab: "LC.1.A.1" }]
        },
        c2: { // SEGUNDO CICLO (Tus fotos)
            mates: [
                { id: "1.1", t1: "Interpretar situaciones de la vida cotidiana (3º)...", t2: "Interpretar y resolver situaciones (4º)...", sab: "MAT.2.A.2.1" },
                { id: "2.1", t1: "Emplear estrategias de resolución pautadas (3º)...", t2: "Comparar estrategias de resolución (4º)...", sab: "MAT.2.B.1" }
            ],
            lengua: [{ id: "2.1", t1: "Comprender textos muy sencillos (3º)...", t2: "Identificar ideas principales (4º)...", sab: "LC.2.A.1" }]
        },
        c3: { // TERCER CICLO
            mates: [{ id: "1.1", t1: "Analizar y resolver problemas complejos (5º)...", t2: "Modelizar situaciones reales (6º)...", sab: "MAT.3.A.1" }],
            lengua: [{ id: "2.1", t1: "Analizar textos críticos (5º)...", t2: "Valorar el contenido y la forma (6º)...", sab: "LC.3.B.2" }]
        }
    };

    function renderData() {
        const ciclo = document.getElementById('cicloSelect').value;
        const subject = document.getElementById('subjectSelect').value;
        const area = document.getElementById('contentArea');
        area.innerHTML = '';

        const items = curriculum[ciclo][subject] || [];

        items.forEach(item => {
            const grade1 = ciclo === 'c1' ? '1º' : ciclo === 'c2' ? '3º' : '5º';
            const grade2 = ciclo === 'c1' ? '2º' : ciclo === 'c2' ? '4º' : '6º';

            area.innerHTML += `
                <div class="criterio-card">
                    <span class="badge">CRITERIO ${item.id}</span>
                    <span class="grade-label">Nivel ${grade1}</span>
                    <div class="criterio-text">${item.t1}</div>
                    <div style="border-top: 1px solid rgba(255,255,255,0.05); margin: 10px 0;"></div>
                    <span class="grade-label">Nivel ${grade2}</span>
                    <div class="criterio-text">${item.t2}</div>
                    <div class="saberes"><strong>Saberes:</strong> ${item.sab}</div>
                </div>
            `;
        });
    }

    renderData();
</script>
</body>
</html>
