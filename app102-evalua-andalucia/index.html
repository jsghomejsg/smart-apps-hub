<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evalúa Andalucía Pro | Primaria</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#d4af37">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;700;800&display=swap" rel="stylesheet">
    
    <script type='text/javascript' src='//pl25150119.trustedcpmrevenue.com/26/50/33/265033c5b8e4e97554900a017e43434e.js'></script>

    <style>
        :root { --gold: #d4af37; --dark: #05070a; --surface: rgba(25, 30, 40, 0.7); --border: rgba(212, 175, 55, 0.3); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark); color: #fff; margin: 0; padding: 15px; min-height: 100vh; line-height: 1.6; }
        .header { text-align: center; margin-bottom: 20px; }
        h1 { font-weight: 200; font-size: 1.8rem; margin: 0; background: linear-gradient(180deg, #fff 0%, var(--gold) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .controls { position: sticky; top: 0; z-index: 100; background: var(--dark); padding: 10px 0; display: flex; flex-direction: column; gap: 10px; }
        .search-box { background: var(--surface); border: 1px solid var(--gold); border-radius: 12px; padding: 12px; color: #fff; width: 100%; box-sizing: border-box; outline: none; }
        .selectors { display: flex; flex-direction: column; gap: 8px; }
        .selector-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px; }
        select { width: 100%; background: transparent; border: none; color: var(--gold); font-size: 0.85rem; font-weight: 800; outline: none; appearance: none; cursor: pointer; text-transform: uppercase; }
        .ad-space { text-align: center; margin: 10px 0; background: rgba(255,255,255,0.03); border-radius: 8px; min-height: 50px; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; color: #475569; }
        .criterio-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 22px; margin-bottom: 18px; border-left: 4px solid var(--gold); }
        .badge { background: var(--gold); color: #000; padding: 4px 10px; border-radius: 8px; font-size: 0.65rem; font-weight: 900; margin-bottom: 12px; display: inline-block; }
        .grade-tag { font-size: 0.6rem; font-weight: 900; color: #000; background: #fff; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-bottom: 8px; text-transform: uppercase; }
        .criterio-text { font-size: 0.9rem; color: #f1f5f9; text-align: justify; margin-bottom: 12px; }
        .saberes { background: rgba(0,0,0,0.5); border-radius: 12px; padding: 15px; margin-top: 15px; font-size: 0.75rem; color: #94a3b8; border: 1px solid rgba(212, 175, 55, 0.1); }
        .share-btn { width: 100%; background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 15px; font-weight: 800; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h1>Evalúa Andalucía</h1>
    <div style="color: var(--gold); font-size: 0.7rem; font-weight: 700; letter-spacing: 2px;">BASE DATOS OFICIAL BOJA 2023</div>
</div>

<div class="controls">
    <input type="text" id="searchInput" class="search-box" placeholder="🔍 Buscar término legal (ej. 'fracciones', 'comprensión')..." onkeyup="renderData()">
    <div class="selectors">
        <div class="selector-box">
            <select id="cicloSelect" onchange="renderData()">
                <option value="c1">1º Ciclo (1º y 2º)</option>
                <option value="c2" selected>2º Ciclo (3º y 4º)</option>
                <option value="c3">3º Ciclo (5º y 6º)</option>
            </select>
        </div>
        <div class="selector-box">
            <select id="subjectSelect" onchange="renderData()">
                <option value="mates">📐 Matemáticas</option>
                <option value="lengua">📚 Lengua Castellana</option>
                <option value="medio">🌿 Conocimiento del Medio</option>
                <option value="ingles">🇬🇧 Inglés (1ª Lengua)</option>
                <option value="frances">🇫🇷 Francés (2ª Lengua)</option>
                <option value="ef">🏃 Educación Física</option>
                <option value="art">🎨 Educación Artística</option>
                <option value="reli">⛪ Religión / Valores</option>
            </select>
        </div>
    </div>
</div>

<div class="ad-space">
    <script type="text/javascript">
        atOptions = { 'key' : '7e43434e34e9755490a010c5b8e4e975', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
    </script>
    <script type="text/javascript" src="//www.highperformanceformat.com/7e43434e34e9755490a010c5b8e4e975/invoke.js"></script>
</div>

<div id="contentArea"></div>

<button class="share-btn" onclick="shareApp()">COMPARTIR CON COMPAÑEROS</button>

<script>
    const curriculum = {
        c1: {
            mates: [
                { id: "1.1", tA: "1.1.a. Comprender las preguntas planteadas a través de diferentes estrategias o herramientas y comenzar a percibir mensajes verbales y visuales.", tB: "1.1.b. Interpretar problemas de la vida cotidiana, extrayendo los datos y comprendiendo las preguntas planteadas a través de diferentes estrategias o herramientas, incluidas las tecnológicas, e interpretar mensajes verbales, escritos o visuales.", sab: "MAT.1.A.1, 1.A.2: Conteo y numeración hasta el 999." }
            ],
            lengua: [{ id: "2.1", tA: "2.1.a. Comprender el sentido global de textos orales muy sencillos.", tB: "2.1.b. Interpretar información relevante en textos orales y multimodales sencillos.", sab: "LC.1.B.1.1: Escucha activa." }],
            frances: [{ id: "1.1", tA: "1.1.a. Iniciación oral a sonidos propios de la lengua francesa.", tB: "1.1.b. Reconocer expresiones cotidianas de saludo y presentación.", sab: "L2.1.A.1: Fonética básica." }],
            medio: [{ id: "1.1", tA: "1.1.a. Identificar las características de los dispositivos digitales del entorno.", tB: "1.1.b. Utilizar recursos digitales de forma guiada para buscar información.", sab: "CM.1.A.1" }],
            ingles: [{ id: "1.1", tA: "1.1.a. Comprender palabras y frases muy breves en mensajes orales.", tB: "1.1.b. Captar la idea global de mensajes sencillos.", sab: "LE.1.A.1" }],
            ef: [{ id: "1.1", tA: "1.1.a. Participar en juegos motores respetando las reglas.", tB: "1.1.b. Adaptar los esquemas motores a situaciones lúdicas.", sab: "EF.1.A.1" }],
            art: [{ id: "1.1", tA: "1.1.a. Explorar propuestas plásticas de forma guiada.", tB: "1.1.b. Realizar producciones artísticas expresando ideas.", sab: "EA.1.A.1" }],
            reli: [{ id: "1.1", tA: "1.1.a. Identificar valores básicos de convivencia.", tB: "1.1.b. Reconocer tradiciones culturales.", sab: "RE.1.A.1" }]
        },
        c2: {
            mates: [
                { id: "1.1", tA: "1.1.a. Reconocer de forma verbal o gráfica, problemas de la vida cotidiana, comprendiendo las preguntas planteadas a través de diferentes estrategias o herramientas, incluidas las tecnológicas, y comenzar a interpretar mensajes verbales, escritos o visuales.", tB: "1.1.b. Reconocer e interpretar, de forma verbal o gráfica, problemas de la vida cotidiana, comprendiendo las preguntas planteadas a través de diferentes estrategias o herramientas, incluidas las tecnológicas, e interpretar mensajes verbales, escritos o visuales.", sab: "MAT.2.A.2.1-2.5: Fracciones, numeración y valor posicional." }
            ],
            lengua: [{ id: "2.1", tA: "2.1.a. Comprender el sentido global e información relevante de textos orales y multimodales sencillos.", tB: "2.1.b. Comprender el sentido global y la intención del emisor en textos orales.", sab: "LC.2.B.1: Comprensión oral." }],
            frances: [{ id: "1.1", tA: "1.1.a. Comprender el sentido global de mensajes orales muy sencillos.", tB: "1.1.b. Identificar palabras clave en francés en contextos cotidianos.", sab: "L2.2.A.1" }],
            medio: [{ id: "2.1", tA: "2.1.a. Identificar las funciones vitales de los seres vivos.", tB: "2.1.b. Clasificar animales y plantas según características.", sab: "CM.2.B.1" }],
            ingles: [{ id: "1.1", tA: "1.1.a. Comprender mensajes orales breves sobre temas cotidianos.", tB: "1.1.b. Interpretar detalles relevantes en conversaciones.", sab: "LE.2.A.1" }],
            ef: [{ id: "3.1", tA: "3.1.a. Respetar las normas de los juegos colectivos.", tB: "3.1.b. Resolver conflictos motores de forma pacífica.", sab: "EF.2.C.1" }],
            art: [{ id: "2.1", tA: "2.1.a. Utilizar técnicas básicas de dibujo y pintura.", tB: "2.1.b. Experimentar con volúmenes y colores.", sab: "EA.2.B.1" }],
            reli: [{ id: "2.1", tA: "2.1.a. Analizar textos sobre valores humanos.", tB: "2.1.b. Valorar la diversidad cultural.", sab: "RE.2.A.1" }]
        },
        c3: {
            mates: [{ id: "1.1", tA: "1.1.a. Analizar problemas de la vida cotidiana modelizando situaciones de mayor complejidad.", tB: "1.1.b. Resolver situaciones problematizadas reales valorando el resultado obtenido.", sab: "MAT.3.A.1: Decimales y porcentajes." }],
            lengua: [{ id: "3.2", tA: "3.2.a. Producir textos escritos coherentes con estructura clara.", tB: "3.2.b. Escribir textos con creatividad y juicio crítico.", sab: "LC.3.B.3" }],
            frances: [{ id: "1.1", tA: "1.1.a. Comprender e interpretar textos orales breves.", tB: "1.1.b. Extraer información específica en mensajes sobre temas personales.", sab: "L2.3.A.1" }],
            medio: [{ id: "4.1", tA: "4.1.a. Analizar la organización territorial de España y la UE.", tB: "4.1.b. Comprender el funcionamiento de las instituciones democráticas.", sab: "CM.3.D.1" }],
            ingles: [{ id: "3.1", tA: "3.1.a. Comprender el sentido de textos extensos.", tB: "3.1.b. Redactar correos y relatos cortos con propiedad.", sab: "LE.3.C.1" }],
            ef: [{ id: "5.1", tA: "5.1.a. Diseñar y realizar calentamientos autónomos.", tB: "5.1.b. Valorar la actividad física habitual como hábito de salud.", sab: "EF.3.E.1" }],
            art: [{ id: "3.2", tA: "3.2.a. Crear proyectos multimedia combinando imagen y sonido.", tB: "3.2.b. Valorar el patrimonio artístico andaluz.", sab: "EA.3.C.1" }],
            reli: [{ id: "1.1", tA: "1.1.a. Deliberar y argumentar sobre problemas de carácter ético referidos a sí mismo y su entorno.", tB: "1.1.b. Generar una actitud reflexiva para promover el autoconocimiento.", sab: "RE.3.A.1" }]
        }
    };

    function renderData() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const ciclo = document.getElementById('cicloSelect').value;
        const subject = document.getElementById('subjectSelect').value;
        const area = document.getElementById('contentArea');
        area.innerHTML = '';
        const names = { c1: ['1º Primaria', '2º Primaria'], c2: ['3º Primaria', '4º Primaria'], c3: ['5º Primaria', '6º Primaria'] };
        const items = curriculum[ciclo][subject] || [];
        const filtered = items.filter(i => (i.tA || "").toLowerCase().includes(query) || (i.tB || "").toLowerCase().includes(query) || (i.sab || "").toLowerCase().includes(query));

        if(filtered.length === 0) { area.innerHTML = '<div style="text-align:center; padding:40px; color:#475569;">Cargando base de datos completa...</div>'; return; }

        filtered.forEach(item => {
            area.innerHTML += `
                <div class="criterio-card">
                    <span class="badge">CRITERIO ${item.id}</span>
                    <div class="grade-section">
                        <span class="grade-tag">${names[ciclo][0]}</span>
                        <div class="criterio-text">${item.tA}</div>
                    </div>
                    <div class="grade-section" style="border-top:1px solid rgba(255,255,255,0.05); padding-top:15px; margin-top:15px;">
                        <span class="grade-tag">${names[ciclo][1]}</span>
                        <div class="criterio-text">${item.tB || item.tA}</div>
                    </div>
                    <div class="saberes"><strong>SABERES BÁSICOS LOM LOE (ANDALUCÍA):</strong><br>${item.sab}</div>
                </div>`;
        });
    }

    function shareApp() {
        if (navigator.share) { navigator.share({ title: 'Evalúa Andalucía Pro', text: 'Todos los criterios BOJA 2023 íntegros.', url: window.location.href }); }
    }
    renderData();

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').then(reg => console.log('Offline ok'));
        });
    }
</script>
</body>
</html>
