<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evalúa Andalucía Pro | Edición Total</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <script type='text/javascript' src='//pl25150119.trustedcpmrevenue.com/26/50/33/265033c5b8e4e97554900a017e43434e.js'></script>
    <style>
        :root { --gold: #d4af37; --dark: #05070a; --surface: rgba(25, 30, 40, 0.7); --border: rgba(212, 175, 55, 0.3); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark); color: #fff; margin: 0; padding: 15px; min-height: 100vh; }
        .header { text-align: center; margin-bottom: 20px; }
        h1 { font-weight: 800; font-size: 1.8rem; margin: 0; background: linear-gradient(180deg, #fff 0%, var(--gold) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .controls { position: sticky; top: 0; z-index: 100; background: var(--dark); padding: 10px 0; display: flex; flex-direction: column; gap: 10px; }
        .search-box { background: var(--surface); border: 2px solid var(--gold); border-radius: 12px; padding: 14px; color: #fff; width: 100%; box-sizing: border-box; outline: none; }
        .selectors { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .selector-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px; }
        select { width: 100%; background: transparent; border: none; color: var(--gold); font-size: 0.8rem; font-weight: 800; outline: none; appearance: none; cursor: pointer; text-transform: uppercase; }
        .criterio-card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 22px; margin-bottom: 15px; border-left: 5px solid var(--gold); }
        .badge { background: var(--gold); color: #000; padding: 4px 10px; border-radius: 6px; font-size: 0.65rem; font-weight: 900; margin-bottom: 12px; display: inline-block; }
        .grade-tag { font-size: 0.6rem; font-weight: 900; color: #000; background: #fff; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-bottom: 8px; }
        .criterio-text { font-size: 0.95rem; color: #f1f5f9; text-align: justify; line-height: 1.5; margin-bottom: 12px; }
        .saberes { background: rgba(0,0,0,0.5); border-radius: 12px; padding: 15px; font-size: 0.75rem; color: #94a3b8; border: 1px solid rgba(212, 175, 55, 0.1); }
        .saberes strong { color: var(--gold); display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="header">
    <h1>Evalúa Andalucía</h1>
    <div style="color: var(--gold); font-size: 0.65rem; font-weight: 700; letter-spacing: 2px;">BOJA OFICIAL 2023 - TODOS LOS CICLOS</div>
</div>

<div class="controls">
    <input type="text" id="searchInput" class="search-box" placeholder="🔍 Buscar término legal..." onkeyup="render()">
    <div class="selectors">
        <div class="selector-box">
            <select id="etapa" onchange="updateCycles()"><option value="primaria">Primaria</option><option value="eso">ESO</option></select>
        </div>
        <div class="selector-box">
            <select id="ciclo" onchange="updateSubjects()"></select>
        </div>
    </div>
    <div class="selector-box" style="margin-top:5px;">
        <select id="materia" onchange="render()"></select>
    </div>
</div>

<div id="contentArea"></div>

<script>
    const db = {
        primaria: {
            c1: {
                "matemáticas": [{ id: "1.1", t1: "Reconocer problemas de la vida cotidiana en situaciones familiares...", t2: "Interpretar problemas de la vida cotidiana, extrayendo los datos...", sab: "MAT.1.A.1, 1.A.2: Conteo y numeración hasta el 999." }],
                "lengua castellana": [{ id: "2.1", t1: "Comprender el sentido global de textos orales muy sencillos.", t2: "Interpretar información relevante de textos orales sencillos.", sab: "LCL.1.B.1.1: Escucha activa." }],
                "inglés": [{ id: "1.1", t1: "Comprender palabras y frases muy breves sobre temas familiares.", t2: "Captar la idea global de mensajes sencillos en lengua extranjera.", sab: "LEA.1.A.1: Comprensión oral básica." }],
                "educación física": [{ id: "1.1", t1: "Participar en juegos motores respetando las reglas.", t2: "Adaptar esquemas motores básicos a situaciones lúdicas.", sab: "EF.1.A.1: Habilidades motrices." }]
            },
            c2: {
                "matemáticas": [{ id: "1.1", t1: "Reconocer de forma verbal o gráfica problemas de la vida cotidiana.", t2: "Resolver problemas interpretando mensajes y valorando el resultado.", sab: "MAT.2.A.2: Fracciones y numeración hasta el 9999." }],
                "lengua castellana": [{ id: "3.3", t1: "Conocer textos orales sencillos con planificación acompañada.", t2: "Producir textos orales coherentes de la literatura andaluza.", sab: "LCL.2.B.3.3: Literatura infantil andaluza." }],
                "conocimiento medio": [{ id: "2.1", t1: "Identificar las funciones vitales de los seres vivos.", t2: "Clasificar animales y plantas según sus características.", sab: "CMN.2.B.1: Seres vivos y ecosistemas." }],
                "inglés": [{ id: "2.1", t1: "Comprender mensajes orales sobre temas conocidos.", t2: "Identificar información específica en textos orales breves.", sab: "LEA.2.A.1: Estrategias de comprensión oral." }],
                "educación física": [{ id: "1.2", t1: "Desarrollar la coordinación motriz en actividades grupales.", t2: "Resolver conflictos motores de forma pacífica.", sab: "EF.2.B.1: Expresión corporal." }],
                "artística": [{ id: "1.1", t1: "Explorar técnicas plásticas y visuales básicas.", t2: "Realizar creaciones artísticas usando materiales diversos.", sab: "EA.2.A.1: Lenguaje plástico." }]
            },
            c3: {
                "matemáticas": [{ id: "1.1", t1: "Analizar problemas modelizando situaciones de mayor complejidad.", t2: "Resolver situaciones problematizadas reales con rigor matemático.", sab: "MAT.3.A.1: Decimales, porcentajes y operaciones combinadas." }],
                "lengua castellana": [{ id: "3.2", t1: "Producir textos escritos y multimodales coherentes.", t2: "Escribir textos con creatividad y juicio crítico.", sab: "LCL.3.B.3: Expresión escrita avanzada." }],
                "conocimiento medio": [{ id: "3.1", t1: "Analizar la organización de la materia y la energía.", t2: "Investigar sobre las máquinas y los avances tecnológicos.", sab: "CMN.3.C.1: Materia y energía." }],
                "francés": [{ id: "1.1", t1: "Comprender e interpretar textos orales breves y sencillos.", t2: "Extraer información específica en mensajes orales conocidos.", sab: "L2.3.A.1: Comunicación oral en francés." }],
                "inglés": [{ id: "3.2", t1: "Interpretar textos escritos breves y sencillos.", t2: "Redactar textos cortos con una intención comunicativa clara.", sab: "LEA.3.B.1: Comprensión lectora." }],
                "educación física": [{ id: "5.1", t1: "Diseñar calentamientos de forma autónoma.", t2: "Valorar la actividad física como hábito de salud.", sab: "EF.3.E.1: Salud y bienestar." }]
            }
        },
        eso: {
            c1: {
                "biología": [{ id: "1.1", t1: "Analizar procesos biológicos en diferentes formatos.", t2: "Resolver retos científicos aplicando el método investigador.", sab: "BIO.1.A.1: El método científico." }],
                "matemáticas": [{ id: "1.1", t1: "Interpretar retos matemáticos de la vida cotidiana.", t2: "Resolver problemas mediante pensamiento computacional.", sab: "MAT.1.A: Sentido numérico." }]
            }
        }
    };

    const cycleLabels = {
        primaria: { c1: "1º Ciclo (1º/2º)", c2: "2º Ciclo (3º/4º)", c3: "3º Ciclo (5º/6º)" },
        eso: { c1: "1º-3º ESO", c2: "4º ESO" }
    };

    function updateCycles() {
        const etapa = document.getElementById('etapa').value;
        const cicloSel = document.getElementById('ciclo');
        cicloSel.innerHTML = Object.keys(db[etapa]).map(c => `<option value="${c}">${cycleLabels[etapa][c]}</option>`).join('');
        updateSubjects();
    }

    function updateSubjects() {
        const etapa = document.getElementById('etapa').value;
        const ciclo = document.getElementById('ciclo').value;
        const materiaSel = document.getElementById('materia');
        materiaSel.innerHTML = Object.keys(db[etapa][ciclo]).map(m => `<option value="${m}">${m.toUpperCase()}</option>`).join('');
        render();
    }

    function render() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const etapa = document.getElementById('etapa').value;
        const ciclo = document.getElementById('ciclo').value;
        const materia = document.getElementById('materia').value;
        const area = document.getElementById('contentArea');
        area.innerHTML = '';

        const items = (db[etapa][ciclo][materia] || []).filter(i => (i.t1 + i.t2 + i.sab).toLowerCase().includes(query));
        
        area.innerHTML = items.map(item => `
            <div class="criterio-card">
                <span class="badge">CRITERIO ${item.id}</span>
                <div><span class="grade-tag">CURSO IMPAR</span><div class="criterio-text">${item.t1}</div></div>
                <div style="margin-top:15px; border-top:1px solid rgba(255,255,255,0.05); padding-top:10px;">
                    <span class="grade-tag">CURSO PAR</span><div class="criterio-text">${item.t2}</div>
                </div>
                <div class="saberes"><strong>SABERES BÁSICOS:</strong>${item.sab}</div>
            </div>`).join('');
    }

    updateCycles();
</script>
</body>
</html>
