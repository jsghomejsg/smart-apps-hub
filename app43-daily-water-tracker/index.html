<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Daily Water Tracker | Hydration Counter</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --bg: #eff6ff; --card: #ffffff; --text: #1e3a8a; }
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: #fff; padding: 1.2rem; text-align: center; border-bottom: 3px solid var(--primary); }
        .container { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; display: grid; grid-template-columns: 1fr 320px; gap: 2rem; flex: 1; }
        .main-tool { background: var(--card); border-radius: 25px; padding: 2.5rem; text-align: center; box-shadow: 0 10px 25px rgba(59, 130, 246, 0.1); }
        .ad-banner { width: 100%; height: 90px; margin-bottom: 2rem; display: flex; justify-content: center; }
        .glass-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 2rem 0; }
        .glass { background: #dbeafe; border: 3px solid #3b82f6; height: 80px; border-radius: 10px 10px 25px 25px; cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; }
        .glass.full::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; background: #3b82f6; animation: fill 0.5s ease-out; }
        @keyframes fill { from { height: 0; } to { height: 100%; } }
        .sidebar { display: flex; flex-direction: column; gap: 1.5rem; }
        .cta-blue { background: #1e3a8a; color: #fff; padding: 1.5rem; border-radius: 20px; text-align: center; text-decoration: none; }
    </style>
</head>
<body>
<header><div style="font-weight:700; color:var(--primary)">WATER_TRACKER_2026</div></header>
<div class="container">
    <main>
        <div class="ad-banner">
            <script type="text/javascript">
                atOptions = {'key' : '318ba4e4eb97e5a697d43fb713f5456e', 'format' : 'iframe', 'height' : 90, 'width' : 728, 'params' : {}};
            </script>
            <script type="text/javascript" src="//www.highperformanceformat.com/318ba4e4eb97e5a697d43fb713f5456e/invoke.js"></script>
        </div>
        <div class="main-tool">
            <h2>Daily Goal: 8 Glasses</h2>
            <p>Click each glass as you drink</p>
            <div class="glass-grid">
                <div class="glass" onclick="this.classList.toggle('full')"></div>
                <div class="glass" onclick="this.classList.toggle('full')"></div>
                <div class="glass" onclick="this.classList.toggle('full')"></div>
                <div class="glass" onclick="this.classList.toggle('full')"></div>
                <div class="glass" onclick="this.classList.toggle('full')"></div>
                <div class="glass" onclick="this.classList.toggle('full')"></div>
                <div class="glass" onclick="this.classList.toggle('full')"></div>
                <div class="glass" onclick="this.classList.toggle('full')"></div>
            </div>
            <button onclick="document.querySelectorAll('.glass').forEach(g=>g.classList.remove('full'))" style="background:none; border:none; color:var(--primary); cursor:pointer; font-weight:700;">RESET COUNTER</button>
        </div>
    </main>
    <aside class="sidebar">
        <a href="https://www.effectivegatecpm.com/x0sa89dj?key=45fee6aa631e7dbbb3c820358e72eb4e" target="_blank" class="cta-blue">
            <h4>HYDRATION GUIDE 2026</h4>
            <p style="font-size: 0.8rem;">Tips for perfect skin and energy.</p>
            <span style="background:#3b82f6; padding:8px 15px; border-radius:5px; font-size:0.8rem; font-weight:700;">FREE DOWNLOAD</span>
        </a>
    </aside>
</div>
</body>
</html>
