<!DOCTYPE html>

<head>

    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #bef264; --bg: #0a0a0a; --card: #171717; --text: #f5f5f5; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        header { background: #000; padding: 1.5rem; text-align: center; border-bottom: 2px solid var(--primary); }
        .logo { font-family: 'Roboto Condensed', sans-serif; font-size: 1.5rem; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }

        .container { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; display: grid; grid-template-columns: 1fr 320px; gap: 2rem; flex: 1; }
        .main-tool { background: var(--card); border-radius: 12px; padding: 2.5rem; border: 1px solid #262626; }
        
        .ad-banner { width: 100%; height: 90px; margin-bottom: 2rem; display: flex; justify-content: center; overflow: hidden; }

        .gender-selector { display: flex; gap: 1rem; margin-bottom: 2rem; }
        .gender-btn { flex: 1; padding: 12px; border: 1px solid #404040; background: #262626; color: #fff; cursor: pointer; border-radius: 8px; font-weight: 700; }
        .active { background: var(--primary); color: #000; border-color: var(--primary); }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem; }
        label { display: block; font-size: 0.7rem; font-weight: 700; color: #a3a3a3; margin-bottom: 0.5rem; text-transform: uppercase; }
        input { width: 100%; padding: 12px; background: #0a0a0a; border: 1px solid #404040; border-radius: 8px; color: #fff; outline: none; box-sizing: border-box; }
        input:focus { border-color: var(--primary); }

        .res-box { background: var(--primary); color: #000; padding: 2rem; border-radius: 12px; text-align: center; display: none; }
        .res-val { font-size: 3rem; font-weight: 900; margin: 0; }

        /* SEO Interlinking - ACTUALIZADO AL HUB */
        .internal-net { margin-top: 3rem; border-top: 1px solid #262626; padding-top: 1.5rem; }
        .n-links { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 10px; }
        .n-link { font-size: 0.7rem; color: #737373; text-decoration: none; padding: 6px 12px; background: #171717; border-radius: 4px; border: 1px solid #262626; }
        .n-link:hover { color: var(--primary); border-color: var(--primary); }

        .sidebar { display: flex; flex-direction: column; gap: 1.5rem; }
        .cta-fitness { background: var(--primary); color: #000; padding: 1.5rem; border-radius: 12px; text-align: center; text-decoration: none; display: block; }
        .btn-dark { display: block; background: #000; color: #fff; padding: 12px; border-radius: 8px; font-weight: 700; margin-top: 1rem; text-decoration: none; text-transform: uppercase; font-size: 0.8rem; }

        @media (max-width: 800px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header><div class="logo">FITNESS CORE // 2026</div></header>

<div class="container">
    <main>
        <div class="ad-banner">
            <script type="text/javascript">
                atOptions = {
                    'key' : '318ba4e4eb97e5a697d43fb713f5456e',
                    'format' : 'iframe',
                    'height' : 90,
                    'width' : 728,
                    'params' : {}
                };
            </script>
            <script type="text/javascript" src="//www.highperformanceformat.com/318ba4e4eb97e5a697d43fb713f5456e/invoke.js"></script>
        </div>

        <div class="main-tool">
            <h2 style="margin-top:0">Navy Method Body Fat</h2>
            
            <div class="gender-selector">
                <button class="gender-btn active" id="mBtn" onclick="setGender('male')">MALE</button>
                <button class="gender-btn" id="fBtn" onclick="setGender('female')">FEMALE</button>
            </div>

            <div class="form-grid">
                <div><label>Height (cm)</label><input type="number" id="h" placeholder="175" oninput="calc()"></div>
                <div><label>Neck (cm)</label><input type="number" id="n" placeholder="38" oninput="calc()"></div>
                <div><label>Waist (cm)</label><input type="number" id="w" placeholder="85" oninput="calc()"></div>
                <div id="hipBox" style="display:none;"><label>Hips (cm)</label><input type="number" id="hip" placeholder="90" oninput="calc()"></div>
            </div>

            <div class="res-box" id="rb">
                <div style="font-size: 0.8rem; font-weight: 800;">YOUR BODY FAT %</div>
                <p class="res-val" id="result">18.5%</p>
            </div>

            <div class="internal-net">
                <div style="font-size: 0.7rem; font-weight: 700; color: #525252;">SMART HUB HEALTH</div>
                <div class="n-links">
                    <a href="https://jsghomejsg.github.io/smart-apps-hub/water-intake-calculator/" class="n-link">Water Intake</a>
                    <a href="https://jsghomejsg.github.io/smart-apps-hub/sleep-cycle-calculator/" class="n-link">Sleep Cycles</a>

    <aside class="sidebar">
        <a href="https://www.effectivegatecpm.com/x0sa89dj?key=45fee6aa631e7dbbb3c820358e72eb4e" target="_blank" rel="nofollow noopener noreferrer" class="cta-fitness">
            <h4 style="margin:0">2026 MEAL PLAN</h4>
            <p style="font-size: 0.8rem; margin: 12px 0; font-weight: 500;">Burn fat and build muscle. Download the 2026 Nutritional Protocol (Free PDF).</p>
            <span class="btn-dark">DOWNLOAD PLAN</span>
        </a>
    </aside>
</div>

<script>
    let gender = 'male';
    function setGender(g) {
        gender = g;
        document.getElementById('mBtn').classList.toggle('active', g === 'male');
        document.getElementById('fBtn').classList.toggle('active', g === 'female');
        document.getElementById('hipBox').style.display = (g === 'female') ? 'block' : 'none';
        calc();
    }

    function calc() {
        const h = parseFloat(document.getElementById('h').value);
        const n = parseFloat(document.getElementById('n').value);
        const w = parseFloat(document.getElementById('w').value);
        const hip = parseFloat(document.getElementById('hip').value);

        if(h && n && w) {
            let bf = 0;
            if(gender === 'male') {
                bf = 495 / (1.0324 - 0.19077 * Math.log10(w - n) + 0.15456 * Math.log10(h)) - 450;
            } else if(hip) {
                bf = 495 / (1.29579 - 0.35004 * Math.log10(w + hip - n) + 0.22100 * Math.log10(h)) - 450;
            }
            if(bf > 0 && bf < 100) {
                document.getElementById('result').innerText = bf.toFixed(1) + "%";
                document.getElementById('rb').style.display = 'block';
            }
        }
    }
</script>
</body>
</html>
