    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }

        .grid-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
        .stat-card { background: #f1f5f9; padding: 1.5rem; border-radius: 15px; text-align: center; }
        .stat-val { font-size: 1.8rem; font-weight: 800; color: var(--primary); }
        .stat-label { font-size: 0.7rem; color: #64748b; text-transform: uppercase; font-weight: 600; }

        /* Hub Network Actualizado */
        .internal-net { margin-top: 3rem; border-top: 1px solid #e2e8f0; padding-top: 1.5rem; }
        .n-links { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; margin-top: 10px; }
        .n-link { font-size: 0.75rem; color: #475569; text-decoration: none; padding: 6px 12px; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; }

        .sidebar { display: flex; flex-direction: column; gap: 1.5rem; }
        .cta-age { background: var(--primary); color: #fff; padding: 1.5rem; border-radius: 20px; text-align: center; text-decoration: none; display: block; }

<script>
    function calcAge() {
        const dobInput = document.getElementById('dob').value;
        if(!dobInput) return;
        
        const dob = new Date(dobInput);
        const now = new Date();
        
        let age = now.getFullYear() - dob.getFullYear();
        const m = now.getMonth() - dob.getMonth();
        if (m < 0 || (m === 0 && now.getDate() < dob.getDate())) { age--; }
        
        const diffTime = Math.abs(now - dob);
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
        
        let nextBday = new Date(now.getFullYear(), dob.getMonth(), dob.getDate());
        if (now > nextBday) {
            nextBday.setFullYear(now.getFullYear() + 1);
        }
        const daysToBday = Math.ceil((nextBday - now) / (1000 * 60 * 60 * 24));

        document.getElementById('y').innerText = age;
        document.getElementById('d').innerText = diffDays.toLocaleString();
        document.getElementById('next').innerText = daysToBday + " Days";
        document.getElementById('res').style.display = 'block';
    }
</script>
