<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Love & Compatibility Calculator | True Love Test</title>
    <meta name="description" content="Free 2026 Love Calculator. Test your compatibility with your partner or crush based on 2026 numerology. Accurate and fun results.">
    
    <meta name="google-site-verification" content="434e69572ce15af6" />

    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff4d6d; --secondary: #ffccd5; --bg: #fff5f7; --text: #590d22; }
        body { font-family: 'Fredoka', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        header { background: #fff; padding: 1rem; text-align: center; border-bottom: 4px solid var(--primary); }
        .logo { font-weight: 600; font-size: 1.5rem; color: var(--primary); letter-spacing: -1px; }

        .container { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; display: grid; grid-template-columns: 1fr 320px; gap: 2rem; flex: 1; }
        .main-tool { background: #fff; border-radius: 30px; padding: 2.5rem; border: 2px solid var(--secondary); box-shadow: 0 10px 0 var(--secondary); text-align: center; }
        
        .ad-slot { width: 100%; min-height: 90px; margin-bottom: 2rem; display: flex; justify-content: center; }

        .love-inputs { display: flex; align-items: center; justify-content: center; gap: 1rem; margin-bottom: 2rem; }
        input { width: 40%; padding: 15px; border: 2px solid var(--secondary); border-radius: 15px; font-size: 1.1rem; text-align: center; color: var(--text); outline: none; }
        input:focus { border-color: var(--primary); }
        .heart-icon { font-size: 2rem; color: var(--primary); animation: beat 1s infinite; }

        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }

        .btn-calc { background: var(--primary); color: #fff; border: none; padding: 15px 40px; border-radius: 50px; font-size: 1.2rem; font-weight: 600; cursor: pointer; transition: 0.3s; width: 100%; }
        .btn-calc:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4); }

        .result-box { margin-top: 2rem; display: none; padding: 2rem; background: var(--bg); border-radius: 20px; border: 2px dashed var(--primary); }
        .res-percent { font-size: 4rem; font-weight: 600; color: var(--primary); margin: 10px 0; }

        /* Hub Network Actualizado */
        .internal-net { margin-top: 3rem; border-top: 1px solid var(--secondary); padding-top: 1.5rem; }
        .n-links { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; margin-top: 10px; }
        .n-link { font-size: 0.75rem; color: var(--primary); text-decoration: none; padding: 6px 14px; background: #fff; border: 1px solid var(--secondary); border-radius: 20px; }

        .sidebar { display: flex; flex-direction: column; gap: 1.5rem; }
        .cta-box { background: var(--primary); color: #fff; padding: 2rem; border-radius: 30px; text-align: center; text-decoration: none; display: block; }
        .btn-action { display: block; background: #fff; color: var(--primary); padding: 14px; border-radius: 15px; font-weight: 600; margin-top: 1.5rem; text-decoration: none; text-transform: uppercase; }

        @media (max-width: 800px) { .container { grid-template-columns: 1fr; } .love-inputs { flex-direction: column; } input { width: 100%; } }
    </style>
</head>
<body>

<header><div class="logo">❤️ LOVE CALC 2026</div></header>

<div class="container">
    <main>
        <div class="ad-slot">
            <script type="text/javascript">
                atOptions = {
                    'key' : '318ba4e4eb97e5a697d43fb713f5456e',
                    'format' : 'iframe',
                    'height' : 90,
                    'width' : 728,
                    'params' : {}
                };
            </script>
            <script type="text/javascript" src="//www.highperformanceformat.com/318ba4e4eb97e5a697d43fb713f5456e/invoke.js"></script>
        </div>

        <div class="main-tool">
            <h2 style="margin-top:0">Is it True Love?</h2>
            <p style="opacity: 0.8; margin-bottom: 2rem;">Discover your 2026 compatibility based on name numerology.</p>
            
            <div class="love-inputs">
                <input type="text" id="name1" placeholder="Your Name">
                <div class="heart-icon">❤️</div>
                <input type="text" id="name2" placeholder="Partner/Crush">
            </div>

            <button class="btn-calc" onclick="calculateLove()">CALCULATE 2026 SYNERGY</button>

            <div id="result" class="result-box">
                <div style="text-transform: uppercase; font-size: 0.8rem; font-weight: 600;">Match Probability:</div>
                <div class="res-percent" id="percent">88%</div>
                <p id="msg" style="font-style: italic;"></p>
            </div>

            <div class="internal-net">
                <div style="font-size: 0.7rem; font-weight: 600; text-transform: uppercase; color: #a44a5e;">Smart Hub Tools</div>
                <div class="n-links">
                    <a href="https://jsghomejsg.github.io/smart-apps-hub/ai-prompt-generator/" class="n-link">AI Prompts</a>
                    <a href="https://jsghomejsg.github.io/smart-apps-hub/crypto-tax-calculator/" class="n-link">Crypto Tax</a>
                    <a href="https://jsghomejsg.github.io/smart-apps-hub/retirement-countdown/" class="n-link">Retirement</a>
                </div>
            </div>
        </div>
    </main>

    <aside class="sidebar">
        <a href="https://www.effectivegatecpm.com/x0sa89dj?key=45fee6aa631e7dbbb3c820358e72eb4e" target="_blank" class="cta-box">
            <h3 style="margin:0">RELATIONSHIP REPORT</h3>
            <p style="font-size: 0.85rem; margin: 15px 0; font-weight: 400;">Download your 10-page 2026 Relationship Forecast & Analysis (PDF).</p>
            <span class="btn-action">GET ANALYSIS FREE</span>
        </a>
    </aside>
</div>

<script>
    function calculateLove() {
        const n1 = document.getElementById('name1').value;
        const n2 = document.getElementById('name2').value;
        if(n1 && n2) {
            const hash = (n1.length + n2.length) % 10;
            const percentages = [72, 85, 94, 61, 45, 99, 81, 77, 68, 92];
            const p = percentages[hash];
            
            document.getElementById('percent').innerText = p + "%";
            document.getElementById('result').style.display = 'block';
            
            let m = "";
            if(p > 80) m = "A match made in heaven for 2026!";
            else if(p > 60) m = "Good vibes, but needs work.";
            else m = "Focus on yourself this year.";
            document.getElementById('msg').innerText = m;
        } else {
            alert("Please enter both names!");
        }
    }
</script>
</body>
</html>
