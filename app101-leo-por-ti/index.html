<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leo por ti | Tu asistente de lectura</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#d4af37">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #d4af37; --bg: #0a0c10; --surface: rgba(25, 30, 40, 0.7); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: radial-gradient(circle at top left, #1a202c, var(--bg)); color: #f1f5f9; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .card { background: var(--surface); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 35px; padding: 40px; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        h1 { font-weight: 800; background: linear-gradient(to right, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; font-size: 2.2rem; }
        p { color: #94a3b8; font-size: 0.9rem; margin: 10px 0 20px; }
        textarea { width: 100%; height: 200px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; color: #fff; padding: 20px; font-size: 1rem; outline: none; box-sizing: border-box; resize: none; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 16px; border-radius: 18px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-play { background: var(--primary); color: #000; }
        .btn-stop { background: rgba(255,255,255,0.05); color: #fff; }
        .guide { font-size: 0.75rem; color: #475569; margin-top: 25px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Leo por ti</h1>
        <p>Tu voz inteligente para textos largos</p>
        <textarea id="textInput" placeholder="Pega aquí el texto que quieres que lea..."></textarea>
        <div class="btn-group">
            <button class="btn btn-play" onclick="hablar()">ESCUCHAR</button>
            <button class="btn btn-stop" onclick="parar()">PARAR</button>
        </div>
        <div class="guide">
            <strong>Tip:</strong> Para usarla como App, pulsa el botón de compartir y luego "Añadir a pantalla de inicio".
        </div>
    </div>

    <script>
        const synth = window.speechSynthesis;
        function hablar() {
            synth.cancel();
            const texto = document.getElementById('textInput').value;
            if(!texto.trim()) return;
            const mensaje = new SpeechSynthesisUtterance(texto);
            mensaje.lang = 'es-ES';
            synth.speak(mensaje);
        }
        function parar() { synth.cancel(); }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
