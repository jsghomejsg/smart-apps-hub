<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leo por ti | Premium Reader</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#d4af37">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;700;800&display=swap" rel="stylesheet">
    
    <script type='text/javascript' src='//pl25150119.trustedcpmrevenue.com/26/50/33/265033c5b8e4e97554900a017e43434e.js'></script>

    <style>
        :root { --gold: #d4af37; --dark: #05070a; --glass: rgba(255, 255, 255, 0.03); --border: rgba(212, 175, 55, 0.3); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark); background-image: radial-gradient(circle at 0% 0%, #1a1c20 0%, transparent 50%), radial-gradient(circle at 100% 100%, #0c0e12 0%, transparent 50%); color: #fff; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        .container { position: relative; width: 100%; max-width: 420px; padding: 20px; z-index: 10; }
        .glass-card { background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid var(--border); border-radius: 40px; padding: 40px 30px; text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.8); }
        h1 { font-weight: 200; font-size: 2.8rem; margin: 0; letter-spacing: -2px; background: linear-gradient(180deg, #fff 0%, var(--gold) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tagline { color: var(--gold); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 30px; font-weight: 700; opacity: 0.8; }
        textarea { width: 100%; height: 160px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); border-radius: 25px; color: #e0e0e0; padding: 20px; font-size: 1rem; line-height: 1.6; outline: none; box-sizing: border-box; resize: none; margin-bottom: 30px; }
        .play-trigger { width: 80px; height: 80px; background: var(--gold); border-radius: 50%; margin: 0 auto; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; box-shadow: 0 0 30px rgba(212, 175, 55, 0.4); transition: 0.5s; }
        .play-trigger svg { fill: #000; width: 30px; height: 30px; }
        .actions { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .btn-small { background: none; border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; padding: 10px 20px; border-radius: 15px; font-size: 0.75rem; cursor: pointer; }
        .install-text { margin-top: 40px; font-size: 0.65rem; color: #475569; }
    </style>
</head>
<body>

<div class="container">
    <div class="glass-card">
        <h1>Leo por ti</h1>
        <div class="tagline">Audio Reader Experience</div>
        <textarea id="textInput" placeholder="Pega el texto aquí..."></textarea>
        <button class="play-trigger" onclick="handleLeo()">
            <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <div class="actions">
            <button class="btn-small" onclick="stopLeo()">DETENER</button>
            <button class="btn-small" onclick="clearText()">BORRAR</button>
        </div>
        <div class="install-text">PWA Mode: Instalar para pantalla completa</div>
    </div>
</div>

<script type='text/javascript' src='//pl25150146.trustedcpmrevenue.com/7e/43/43/7e43434e34e9755490a010c5b8e4e975.js'></script>

<script>
    const synth = window.speechSynthesis;
    let wakeLock = null;

    // Función para mantener la pantalla encendida
    async function requestWakeLock() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
            }
        } catch (err) { console.log("WakeLock error"); }
    }

    function handleLeo() {
        if (synth.speaking) {
            if (synth.paused) { synth.resume(); setUI(true); }
            else { synth.pause(); setUI(false); }
            return;
        }

        const text = document.getElementById('textInput').value;
        if(!text.trim()) return;

        const utterance = new SpeechSynthesisUtterance(text);
        
        // --- SELECCIÓN DE VOZ NATURAL ---
        let voices = synth.getVoices();
        // Intentamos buscar una voz de Google o Premium en español
        let bestVoice = voices.find(v => v.lang.includes('es') && v.name.includes('Google')) || 
                        voices.find(v => v.lang.includes('es')) || 
                        voices[0];
        
        utterance.voice = bestVoice;
        utterance.rate = 0.95; // Un pelín más lento para sonar natural
        utterance.pitch = 1.0; 

        utterance.onstart = () => {
            setUI(true);
            requestWakeLock(); // Activamos WakeLock al empezar
        };
        
        utterance.onend = () => {
            setUI(false);
            if(wakeLock) wakeLock.release(); // Soltamos WakeLock al terminar
        };

        synth.speak(utterance);
    }

    function stopLeo() { 
        synth.cancel(); 
        setUI(false); 
        if(wakeLock) wakeLock.release();
    }

    function clearText() { stopLeo(); document.getElementById('textInput').value = ''; }
    
    function setUI(isPlaying) {
        const icon = document.getElementById('playIcon');
        icon.innerHTML = isPlaying ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>' : '<path d="M8 5v14l11-7z"/>';
    }

    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
</script>
</body>
</html>
